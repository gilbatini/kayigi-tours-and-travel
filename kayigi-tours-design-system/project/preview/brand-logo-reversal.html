<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:24px 26px; display:flex; gap:22px; align-items:center; }
  .panel { flex:1; display:flex; align-items:center; justify-content:center; height:118px; border-radius:var(--r-lg); }
  .maroon { background:var(--maroon-700); }
  .photo { background:linear-gradient(150deg,#5a3325,#2f2018); }
  img { height:60px; }
  .mark img { height:72px; }
  .cap { font-size:11px; color:var(--fg-3); text-align:center; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <div style="flex:1.4">
    <div class="panel maroon"><img src="../assets/logo-full-white.png" alt="Kayigi white lockup"></div>
    <div class="cap">White reversal · on maroon</div>
  </div>
  <div class="mark">
    <div class="panel photo"><img src="../assets/logo-mark-white.png" alt="Kayigi white mark"></div>
    <div class="cap">Mark · over photography</div>
  </div>
</div>
</body>
</html>
