<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:22px 26px; }
  .big { font-family:var(--font-display); font-weight:600; font-size:60px; line-height:0.98; color:var(--fg-1); letter-spacing:-0.01em; margin:0; }
  .big em { font-style:italic; color:var(--maroon-600); }
  .meta { margin-top:14px; display:flex; gap:18px; font-size:12px; color:var(--fg-3); }
  .meta b { color:var(--fg-1); font-weight:600; }
</style>
</head>
<body>
<div class="wrap">
  <p class="big">Stand metres from a <em>mountain gorilla.</em></p>
  <div class="meta"><span><b>Cormorant Garamond</b> · Display serif</span><span>weight 600 · –1% tracking</span><span>line-height 1.0</span></div>
</div>
</body>
</html>
