<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:26px; display:flex; gap:26px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .box { width:96px; height:62px; background:#fff; border-radius:var(--r-md); }
  .sm { box-shadow:var(--shadow-sm); }
  .md { box-shadow:var(--shadow-md); }
  .lg { box-shadow:var(--shadow-lg); }
  .mr { box-shadow:var(--shadow-maroon); }
  .n { font-size:11.5px; font-weight:600; color:var(--fg-1); }
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="box sm"></div><span class="n">sm</span></div>
  <div class="item"><div class="box md"></div><span class="n">md</span></div>
  <div class="item"><div class="box lg"></div><span class="n">lg</span></div>
  <div class="item"><div class="box mr" style="background:var(--maroon-600)"></div><span class="n">maroon glow</span></div>
</div>
</body>
</html>
