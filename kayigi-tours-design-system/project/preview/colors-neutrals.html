<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:22px 24px; }
  .row { display:flex; gap:0; border-radius:var(--r-md); overflow:hidden; box-shadow:var(--shadow-sm); border:1px solid var(--sand-deep); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:10px; box-sizing:border-box; }
  .hex { font-size:12px; font-weight:600; }
  .nm { font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; opacity:0.65; }
  .cap { margin-top:12px; font-size:12.5px; color:var(--fg-3); }
  b { color:var(--maroon-600); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#FBF9F2;color:#2A211E"><span class="nm">paper</span><span class="hex">#FBF9F2</span></div>
    <div class="sw" style="background:#F2EBDD;color:#2A211E"><span class="nm">sand</span><span class="hex">#F2EBDD</span></div>
    <div class="sw" style="background:#E7DBC6;color:#2A211E"><span class="nm">sand-deep</span><span class="hex">#E7DBC6</span></div>
    <div class="sw" style="background:#4A403C;color:#FBF9F2"><span class="nm">ink-soft</span><span class="hex">#4A403C</span></div>
    <div class="sw" style="background:#2A211E;color:#FBF9F2"><span class="nm">ink</span><span class="hex">#2A211E</span></div>
  </div>
  <div class="cap"><b>Warm neutrals</b> — cream &amp; sand carry the page; ink is a warm near-black. Never pure black or cold gray.</div>
</div>
</body>
</html>
