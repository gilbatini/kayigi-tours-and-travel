<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:22px 24px; }
  .grp { margin-bottom:14px; }
  .lab { font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--slate-500); margin:0 0 7px; }
  .row { display:flex; gap:0; border-radius:var(--r-md); overflow:hidden; box-shadow:var(--shadow-sm); border:1px solid var(--sand-deep); }
  .sw { flex:1; height:70px; display:flex; flex-direction:column; justify-content:flex-end; padding:9px; box-sizing:border-box; }
  .hex { font-size:11.5px; font-weight:600; }
  .nm { font-size:10px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; opacity:0.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="grp">
    <p class="lab">Slate — muted UI &amp; secondary text (from logo subtitle)</p>
    <div class="row">
      <div class="sw" style="background:#4E5862;color:#fff"><span class="nm">700</span><span class="hex">#4E5862</span></div>
      <div class="sw" style="background:#6E7A85;color:#fff"><span class="nm">500</span><span class="hex">#6E7A85</span></div>
      <div class="sw" style="background:#9AA4AD;color:#fff"><span class="nm">300</span><span class="hex">#9AA4AD</span></div>
      <div class="sw" style="background:#DDE1E4;color:#4E5862"><span class="nm">100</span><span class="hex">#DDE1E4</span></div>
    </div>
  </div>
</div>
</body>
</html>
