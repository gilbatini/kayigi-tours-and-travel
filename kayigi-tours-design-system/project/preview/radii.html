<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:24px 26px; display:flex; gap:20px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:74px; height:62px; background:var(--sand); border:1.5px solid var(--maroon-300); border-top-left-radius:0; }
  .n { font-size:11.5px; font-weight:600; color:var(--fg-1); }
  .v { font-size:10.5px; color:var(--fg-3); }
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:3px"></div><span class="n">xs</span><span class="v">3px</span></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><span class="n">sm</span><span class="v">6px</span></div>
  <div class="item"><div class="box" style="border-radius:10px"></div><span class="n">md</span><span class="v">10px</span></div>
  <div class="item"><div class="box" style="border-radius:18px"></div><span class="n">lg · photo</span><span class="v">18px</span></div>
  <div class="item"><div class="box" style="border-radius:999px;width:62px"></div><span class="n">pill</span><span class="v">999px</span></div>
</div>
</body>
</html>
