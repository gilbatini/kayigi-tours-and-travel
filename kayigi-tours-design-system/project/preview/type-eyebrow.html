<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:24px 26px; display:flex; flex-direction:column; gap:18px; }
  .eyebrow { font-family:var(--font-sans); font-size:12px; font-weight:600; letter-spacing:0.22em; text-transform:uppercase; color:var(--maroon-600); }
  .label { font-size:13px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--slate-500); }
  .note { font-size:11.5px; color:var(--fg-3); margin-top:2px; }
  .grp { display:flex; flex-direction:column; gap:5px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="grp">
    <span class="eyebrow">Bwindi Impenetrable Forest</span>
    <span class="note">Eyebrow — Archivo 600, 0.22em tracking, maroon. Sits above headlines.</span>
  </div>
  <div class="grp">
    <span class="label">Tours and Travel</span>
    <span class="note">Label — Archivo 600, 0.18em, slate. Echoes the wordmark subtitle; used for meta + nav.</span>
  </div>
</div>
</body>
</html>
