<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:22px 24px; }
  .row { display:flex; gap:0; border-radius:var(--r-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:10px; box-sizing:border-box; }
  .hex { font-size:12px; font-weight:600; letter-spacing:0.02em; }
  .nm { font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; opacity:0.7; }
  .cap { margin-top:12px; font-size:12.5px; color:var(--fg-3); }
  b { color:var(--maroon-600); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#3A0A1E;color:#E9C9D3"><span class="nm">900</span><span class="hex">#3A0A1E</span></div>
    <div class="sw" style="background:#4E0C28;color:#E9C9D3"><span class="nm">800</span><span class="hex">#4E0C28</span></div>
    <div class="sw" style="background:#600C30;color:#F0DDE4"><span class="nm">700 · core</span><span class="hex">#600C30</span></div>
    <div class="sw" style="background:#6E1336;color:#F8EFE3"><span class="nm">600 · primary</span><span class="hex">#6E1336</span></div>
    <div class="sw" style="background:#84244A;color:#F8EFE3"><span class="nm">500</span><span class="hex">#84244A</span></div>
    <div class="sw" style="background:#B97E94;color:#3A0A1E"><span class="nm">300</span><span class="hex">#B97E94</span></div>
    <div class="sw" style="background:#F0E2E8;color:#6E1336"><span class="nm">100</span><span class="hex">#F0E2E8</span></div>
  </div>
  <div class="cap"><b>Maroon</b> — the signature, sampled from the wordmark. Primary actions, masthead, eyebrows.</div>
</div>
</body>
</html>
