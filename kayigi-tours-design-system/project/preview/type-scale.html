<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:20px 26px; }
  .line { display:flex; align-items:baseline; gap:16px; padding:6px 0; border-bottom:1px solid var(--sand-deep); }
  .line:last-child { border-bottom:none; }
  .tag { font-size:10.5px; font-weight:600; letter-spacing:0.06em; color:var(--slate-300); width:62px; flex:none; text-transform:uppercase; }
  .ser { font-family:var(--font-display); font-weight:600; color:var(--fg-1); line-height:1.05; }
</style>
</head>
<body>
<div class="wrap">
  <div class="line"><span class="tag">H1 · 54</span><span class="ser" style="font-size:44px">Tracking the Kibale chimps</span></div>
  <div class="line"><span class="tag">H2 · 40</span><span class="ser" style="font-size:34px">Six parks, one journey</span></div>
  <div class="line"><span class="tag">H3 · 28</span><span class="ser" style="font-size:26px">What your permit includes</span></div>
  <div class="line"><span class="tag">H4 · 21</span><span style="font-family:var(--font-sans);font-weight:600;font-size:20px;color:var(--fg-1)">Self-drive or driver-guide</span></div>
</div>
</body>
</html>
