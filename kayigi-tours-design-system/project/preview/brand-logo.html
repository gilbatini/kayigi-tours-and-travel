<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:24px 26px; display:flex; gap:22px; align-items:center; }
  .panel { flex:1; display:flex; align-items:center; justify-content:center; height:118px; border-radius:var(--r-lg); }
  .cream { background:var(--paper); border:1px solid var(--sand-deep); }
  .sand { background:var(--sand); }
  img { height:64px; }
  .mark img { height:74px; }
  .cap { font-size:11px; color:var(--fg-3); text-align:center; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <div style="flex:1.4">
    <div class="panel cream"><img src="../assets/logo-full.png" alt="Kayigi full lockup"></div>
    <div class="cap">Full lockup · on cream</div>
  </div>
  <div class="mark">
    <div class="panel sand"><img src="../assets/logo-mark.png" alt="Kayigi mark"></div>
    <div class="cap">Mark only</div>
  </div>
</div>
</body>
</html>
