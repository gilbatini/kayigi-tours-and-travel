<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--paper); }
  .wrap { padding:24px 26px; display:flex; flex-direction:column; gap:16px; }
  .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .btn { font-family:var(--font-sans); font-size:14px; font-weight:600; border:none; cursor:pointer;
         display:inline-flex; align-items:center; gap:8px; border-radius:var(--r-pill);
         padding:12px 22px; transition:all var(--dur) var(--ease-out); }
  .btn svg { width:16px; height:16px; }
  .primary { background:var(--maroon-600); color:#F8EFE3; box-shadow:var(--shadow-maroon); }
  .primary:hover { background:var(--maroon-800); }
  .secondary { background:transparent; color:var(--maroon-600); border:1.5px solid var(--maroon-300); }
  .secondary:hover { background:var(--maroon-100); }
  .gold { background:var(--gold); color:#3A2206; }
  .gold:hover { filter:brightness(0.95); }
  .ghost { background:transparent; color:var(--ink-soft); padding:12px 12px; }
  .ghost:hover { color:var(--maroon-600); }
  .small { padding:8px 16px; font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <button class="btn primary">Plan my trek <i data-lucide="arrow-right"></i></button>
    <button class="btn secondary">Request a quote</button>
    <button class="btn gold"><i data-lucide="phone"></i> Talk to a guide</button>
    <button class="btn ghost">See vehicles <i data-lucide="chevron-right"></i></button>
  </div>
  <div class="row">
    <button class="btn primary small">Enquire</button>
    <button class="btn secondary small"><i data-lucide="heart"></i> Save</button>
    <button class="btn secondary small"><i data-lucide="map"></i> View on map</button>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
